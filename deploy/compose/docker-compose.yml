  #     POSTGRES_DB: ${POSTGRES_DB:-celeris}
  #     POSTGRES_USER: ${POSTGRES_USER:-celeris}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
  #   volumes:
  #     - db-data:/var/lib/postgresql/data

volumes:
  api-data:
