# Celeris API Server Configuration
# Copy this file to api.yaml and adjust as needed.

# server config
server:
  domain: "www.example.com"
  port: 8080
  listen: 0.0.0.0
  name: "Celeris-api-server"

database:
  dsn: "data.db"            # SQLite database file path

jwt:
  secret: "my-super-secret-key"    # JWT signing secret (change in production!)
  issuer: "celeris-api"

# ── Admin Account ───────────────────────────────────────────────────────
# On first run, if no admin user exists with this email, one is created
# automatically with a random 12-character password that is printed to
# the server log exactly once. Change the password via the web UI after
# first login.
admin:
  email: "admin@celeris.local"     # Admin account email (default)

grpc:
  listen: ":50051"           # gRPC listen address for agent communication

message:
  address: "127.0.0.1:9090"                  # celeris-message gRPC address; leave blank to disable integration
  service_token: "change-me-message-service-token"
  timeout: "2s"
  user_registered:
    enabled: true
    channel: "IN_APP"                        # IN_APP or EMAIL
    subject: "Welcome to Celeris"
    content: "Your account has been created successfully."
    template_code: ""                        # Optional template code; when set, raw content is ignored

billing:
  renewal_issue_lead_days: 7                 # generate next monthly invoice N days before current period ends
  renewal_poll_interval: "1h"                # how often the renewal worker scans active monthly orders

# Agent authentication is now handled via bootstrap tokens (created via
# the admin API: POST /admin/bootstrap-tokens) and permanent node tokens
# issued during registration. The old static agent.secret is no longer used.

# ── Tiered Rate Limiting ────────────────────────────────────────────────
# Each tier has independent global QPS (total throughput cap for this tier)
# and per-IP QPS (per-client fairness). Set to 0 to disable that layer.
#
# Tier assignment:
#   baseline  → ALL endpoints (loose safety net, fires only under extreme load)
#   critical  → public catalog GET: /products, /groups, /regions, /resource-pools, /nodes
#   checkout  → purchase/payment writes: /checkout, /products/purchase, /orders/:id/pay
#   auth      → login/register: /auth/login, /auth/register
#   standard  → general authenticated: /invoices, /orders, /instances, /me, etc.
#   admin     → /admin/* (RBAC-protected, relaxed)
#   (none)    → agent + webhook endpoints are NOT rate-limited
rate_limit:
  baseline:
    global_qps: 5000
    ip_max_qps: 50
  critical:
    global_qps: 2000
    ip_max_qps: 30
  checkout:
    global_qps: 1000
    ip_max_qps: 5
  auth:
    global_qps: 500
    ip_max_qps: 3
  standard:
    global_qps: 1000
    ip_max_qps: 15
  admin:
    global_qps: 0          # no global cap for admin (RBAC is the real gate)
    ip_max_qps: 20

# ── USDT Crypto Payment ────────────────────────────────────────────────
# Supports multi-chain USDT payments: Arbitrum, Solana, TRC-20, BSC, Polygon.
#
# Two modes:
#   mock_mode: true  → Development: payments auto-confirm after mock_confirm_delay.
#                       No real blockchain interaction. Good for local testing.
#   mock_mode: false → Production: the system waits for a real webhook callback
#                       from a blockchain monitoring service (e.g. Alchemy, Moralis,
#                       or custom chain indexer) to confirm on-chain USDT transfers.
#                       The webhook endpoint is: POST /api/v1/payments/webhook
#
# Environment variable override: CRYPTO_MOCK_MODE=false (overrides yaml setting)
#
# Wallet addresses:
#   Replace the example addresses below with your actual receiving addresses.
#   Each network requires a separate wallet that can receive USDT on that chain.
#   EVM chains (arbitrum, bsc, polygon) can share the same address if desired.
crypto:
  mock_mode: true              # true = dev (auto-confirm), false = production (webhook)
  mock_confirm_delay: "3s"     # delay before auto-confirming in mock mode
  payment_timeout: "30m"       # how long before a pending charge expires

  # Receiving wallet addresses per network.
  # In production, replace with your actual cold/hot wallet addresses.
  wallets:
    arbitrum: "0x742d35Cc6634C0532925a3b844Bc9e7595f2bD3E"   # Arbitrum One (L2, ~$0.10 fee)
    solana:   "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v" # Solana (~$0.001 fee)
    trc20:    "TN3W4H6rK2ce4vX9YnFQHwKENnHjoxb3m9"           # TRON TRC-20 (~$1.00 fee)
    bsc:      "0x742d35Cc6634C0532925a3b844Bc9e7595f2bD3E"   # BNB Smart Chain (~$0.05 fee)
    polygon:  "0x742d35Cc6634C0532925a3b844Bc9e7595f2bD3E"   # Polygon PoS (~$0.01 fee)
